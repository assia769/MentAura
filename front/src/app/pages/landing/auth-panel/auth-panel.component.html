<div class="auth-card">

  <!-- Header -->
  <div class="card-strip">
    <div class="card-num">Welcome !</div>
  </div>

  <!-- Tabs -->
  <div class="card-tabs">
    <button class="card-tab" [class.active]="currentTab === 'login'" (click)="switchTab('login')">
      LOG IN
    </button>
    <button class="card-tab" [class.active]="currentTab === 'register'" (click)="switchTab('register')">
      REGISTER
    </button>
    <div class="tab-slider" [style.left.%]="currentTab === 'register' ? 50 : 3"></div>
  </div>

  <!-- ERROR -->
  <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

  <!-- ───────── LOGIN ───────── -->
<div [hidden]="currentTab !== 'login' || showMfa">

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="loginEmail" placeholder="votre@email.com" name="loginEmail"/>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="pw-wrap">
        <input #pwLogin type="password" [(ngModel)]="loginPassword" placeholder="••••••••" name="loginPassword"/>
        <button type="button" (click)="togglePw(pwLogin)">👁</button>
      </div>
    </div>

    <!-- CAPTCHA LOGIN -->
    <div class="captcha-wrap">
      <div id="login-captcha"></div>
    </div>

    <button class="btn-submit login-btn" (click)="onLogin()" [disabled]="loading">
      <span *ngIf="!loading">SE CONNECTER</span>
      <span *ngIf="loading" class="loading-dots">Connexion</span>
    </button>

  </div>

  <!-- ───────── MFA ───────── -->
  <div *ngIf="showMfa">

    <p class="mfa-hint">
      🔐 Entrez le code à 6 chiffres.
    </p>

    <div class="form-group">
      <label>Code MFA</label>
      <input type="text" [(ngModel)]="mfaCode" maxlength="6" inputmode="numeric"/>
    </div>

    <button class="btn-primary" (click)="onVerifyMfa()" [disabled]="loading">
      {{ loading ? 'Vérification...' : 'Vérifier le code' }}
    </button>

    <button class="btn-link" (click)="showMfa = false; errorMsg = ''">
      ← Retour
    </button>

  </div>

  <!-- ───────── REGISTER ───────── -->
<div [hidden]="currentTab !== 'register'">

    <div class="form-group">
      <label>Nom</label>
      <input type="text" [(ngModel)]="regNom" placeholder="Bennani" name="regNom"/>
    </div>

    <div class="form-group">
      <label>Prénom</label>
      <input type="text" [(ngModel)]="regPrenom" placeholder="Ahmed" name="regPrenom"/>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="regEmail" placeholder="votre@email.com" name="regEmail"/>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="pw-wrap">
        <input
          #pwReg
          type="password"
          [(ngModel)]="regPassword"
          (input)="checkStrength(regPassword)"
          placeholder="••••••••"
          name="regPassword"
        />
        <button type="button" (click)="togglePw(pwReg)">👁</button>
      </div>

      <!-- Strength -->
      <div class="strength-bar">
        <span *ngFor="let i of [1,2,3,4]" [style.background]="getStrengthColor(i)"></span>
      </div>
      <small>{{ getStrengthLabel() }}</small>
    </div>

    <!-- CAPTCHA REGISTER -->
    <div class="captcha-wrap">
      <div id="register-captcha"></div>
    </div>

    <div *ngIf="successMsg" class="success-msg">{{ successMsg }}</div>

    <button class="register-btn" (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Création...' : 'Créer mon compte' }}
    </button>

  </div>

</div>
