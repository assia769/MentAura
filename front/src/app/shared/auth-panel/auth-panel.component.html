<div class="auth-card">
  <!-- Header -->
  <div class="card-strip">
    <div class="card-num">Mentaura</div>
  </div>

  <!-- Error Banner -->
  <div class="error-banner" *ngIf="errorMsg">
    <span>⚠ {{ errorMsg }}</span>
  </div>

  <!-- Tabs -->
  <div class="card-tabs">
    <button class="card-tab" [class.active]="currentTab === 'login'" (click)="switchTab('login')">
      CONNEXION
    </button>
    <button class="card-tab" [class.active]="currentTab === 'register'" (click)="switchTab('register')">
      INSCRIPTION
    </button>
    <div class="tab-slider" [style.left.%]="currentTab === 'register' ? 50 : 3"></div>
  </div>

  <!-- LOGIN FORM -->
  <form class="auth-form" [class.active]="currentTab === 'login'" (ngSubmit)="onLogin()" #loginForm="ngForm">
    <div class="field-group">
      <label class="field-label">EMAIL</label>
      <input class="field-input" type="email" placeholder="vous@exemple.com"
             [(ngModel)]="loginEmail" name="loginEmail" required />
    </div>

    <div class="field-group">
      <label class="field-label">MOT DE PASSE</label>
      <input class="field-input" type="password" placeholder="••••••••"
             [(ngModel)]="loginPassword" name="loginPassword" required #pwInput />
      <button class="field-toggle" type="button" (click)="togglePw(pwInput)">
        {{ pwInput.type === 'password' ? '○' : '●' }}
      </button>
    </div>

    <div id="recaptcha-container" class="captcha-wrap"></div>

    <button type="submit" class="btn-submit" [disabled]="loading">
      <span *ngIf="!loading">CONNEXION</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>
    <p class="switch-note">Pas de compte ? <a (click)="switchTab('register')">S'inscrire</a></p>
  </form>

  <!-- REGISTER FORM -->
  <form class="auth-form" [class.active]="currentTab === 'register'" (ngSubmit)="onRegister()">
    <div class="fields-row">
      <div class="field-group">
        <label class="field-label">NOM</label>
        <input class="field-input" type="text" placeholder="Dupont"
               [(ngModel)]="regNom" name="regNom" required />
      </div>
      <div class="field-group">
        <label class="field-label">PRÉNOM</label>
        <input class="field-input" type="text" placeholder="Marie"
               [(ngModel)]="regPrenom" name="regPrenom" required />
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">EMAIL</label>
      <input class="field-input" type="email" placeholder="vous@exemple.com"
             [(ngModel)]="regEmail" name="regEmail" required />
    </div>

    <div class="field-group">
      <label class="field-label">MOT DE PASSE</label>
      <input class="field-input" type="password" placeholder="Min. 8 caractères"
             [(ngModel)]="regPassword" name="regPassword" required
             (input)="checkStrength($any($event.target).value)"
             #regPw />
      <button class="field-toggle" type="button" (click)="togglePw(regPw)">
        {{ regPw.type === 'password' ? '○' : '●' }}
      </button>
      <div class="strength-meter">
        <div class="strength-blocks">
          <div class="s-block" [style.background]="getStrengthColor(1)"></div>
          <div class="s-block" [style.background]="getStrengthColor(2)"></div>
          <div class="s-block" [style.background]="getStrengthColor(3)"></div>
          <div class="s-block" [style.background]="getStrengthColor(4)"></div>
        </div>
        <span class="strength-text">{{ getStrengthLabel() }}</span>
      </div>
    </div>

    <div id="recaptcha-container" class="captcha-wrap"></div>

    <button type="submit" class="btn-submit" [disabled]="loading">
      <span *ngIf="!loading">CRÉER UN COMPTE</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>
    <p class="switch-note">Déjà inscrit ? <a (click)="switchTab('login')">Se connecter</a></p>
  </form>
</div>
